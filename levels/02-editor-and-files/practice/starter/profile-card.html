<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人卡片 · 第 02 关练习</title>
  <style>
    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      margin: 0;
      padding: 2rem 1rem;
      background: #f1f5f9;
      color: #0f172a;
      line-height: 1.6;
    }
    .card {
      max-width: 360px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid #e2e8f0;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
    }
    h1 {
      font-size: 1.25rem;
      margin: 0 0 0.5rem;
      color: #4f46e5;
    }
    .intro {
      margin: 0 0 1.25rem;
      color: #64748b;
      font-size: 0.95rem;
    }
    button {
      padding: 0.55rem 1.1rem;
      border: none;
      border-radius: 8px;
      background: #4f46e5;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
    }
    button:hover {
      filter: brightness(1.05);
    }
    #msg {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #334155;
      min-height: 1.5em;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="nameLine">请改成你的姓名</h1>
    <p class="intro" id="introLine">请改成一句话介绍你自己（不必很长）。</p>
    <button type="button" id="btn">点我一下</button>
    <p id="msg">默认提示：点按钮后这里会换一句话。请把上面姓名、介绍和本句都按 START_HERE 要求改掉。</p>
  </div>
  <script>
    document.getElementById("btn").onclick = function () {
      document.getElementById("msg").textContent =
        "请把这句话改成按钮点击后你想显示的一句提示（例如：保存成功，继续加油！）";
    };
  </script>
</body>
</html>
